name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Rust and release verification
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v7.0.0

      - name: Install the minimum supported Rust toolchain
        run: |
          rustup toolchain install 1.85.0 --profile minimal --component clippy,rustfmt
          rustup default 1.85.0

      - name: Verify formatting
        run: cargo fmt --check

      - name: Run release tests
        env:
          RUSTFLAGS: --remap-path-prefix=/Users=/build/users
        run: cargo test --locked --release

      - name: Run Clippy
        env:
          RUSTFLAGS: --remap-path-prefix=/Users=/build/users
        run: cargo clippy --locked --all-targets --all-features --release -- -D warnings

      - name: Build the release binary
        env:
          RUSTFLAGS: --remap-path-prefix=/Users=/build/users
        run: cargo build --locked --release

      - name: Check binary type and local path hygiene
        run: |
          file target/release/rm-to-trash
          if strings target/release/rm-to-trash | grep -E '/Users/|/home/'; then
            echo "release binary contains a local build path" >&2
            exit 1
          fi
